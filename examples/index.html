<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>glyphdust — demo</title>
    <style>
      :root { color-scheme: light; }
      * { margin: 0; box-sizing: border-box; }
      html, body { color: #1b2330; font-family: system-ui, sans-serif; }
      /* 上質なアンビエント背景: 青グロー + インクグロー + 微細ドットグリッド（固定）。 */
      body {
        background:
          radial-gradient(circle at 22% 38%, rgba(0, 85, 255, 0.10), transparent 42%),
          radial-gradient(circle at 78% 60%, rgba(27, 35, 48, 0.06), transparent 42%),
          radial-gradient(rgba(27, 35, 48, 0.16) 1px, transparent 1.4px),
          #ffffff;
        background-size: 100% 100%, 100% 100%, 26px 26px;
        background-attachment: fixed;
      }
      #root { width: 100%; }
      .caption {
        position: fixed; left: 50%; bottom: 24px; transform: translateX(-50%);
        font-size: 13px; letter-spacing: 0.04em; opacity: 0.55; z-index: 10;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div class="caption">scroll ↓ — text → particles → glyph → real text</div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
