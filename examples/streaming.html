<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>glyphdust — streaming morphTo()</title>
    <style>
      * { margin: 0; box-sizing: border-box; }
      html, body { background: #fff; color: #1b2330; font-family: system-ui, sans-serif; }
      .wrap { max-width: 920px; margin: 0 auto; padding: 32px 20px; }
      h1 { font-size: 15px; letter-spacing: 0.04em; opacity: 0.55; margin-bottom: 16px; font-weight: 600; }
      #hero { width: 100%; height: 380px; border: 1px solid rgba(27,35,48,0.08); border-radius: 12px; }
      .row { display: flex; gap: 8px; margin-top: 16px; }
      input { flex: 1; font-size: 14px; padding: 10px 12px; border: 1px solid rgba(27,35,48,0.2); border-radius: 8px; }
      button { font-size: 13px; padding: 10px 14px; border: 1px solid rgba(27,35,48,0.2); border-radius: 8px; background: #f6f7f9; cursor: pointer; }
      pre { margin-top: 20px; font-size: 12px; background: #f6f7f9; padding: 14px; border-radius: 8px; overflow: auto; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>morphTo() — エージェントが「その場の言葉」を作り直しなしで次々出す</h1>
      <div id="hero"></div>
      <div class="row">
        <input id="say" placeholder="ここに打って Enter → その言葉へモーフ" />
        <button id="scatter">scatter</button>
        <button id="demo">agent demo</button>
      </div>
      <pre>const h = glyphText("#hero", "HELLO");
await h.morphTo("THINKING");   // 粒子がその場の姿から再収束（作り直し無し）
await h.morphTo("DONE");       // await で順番待ちも、待たず latest-wins も可
await h.scatter();             // 言葉が無いときは雲へ</pre>
    </div>
    <script type="module" src="/src/streaming-main.ts"></script>
  </body>
</html>
