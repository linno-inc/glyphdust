<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>glyphdust — vanilla glyphText()</title>
    <style>
      * { margin: 0; box-sizing: border-box; }
      html, body { background: #fff; color: #1b2330; font-family: system-ui, sans-serif; }
      .wrap { max-width: 920px; margin: 0 auto; padding: 32px 20px; }
      h1 { font-size: 15px; letter-spacing: 0.04em; opacity: 0.55; margin-bottom: 16px; font-weight: 600; }
      /* AI が渡す「箱」。glyphText がこの中いっぱいに canvas を敷く。 */
      #hero { width: 100%; height: 380px; border: 1px solid rgba(27,35,48,0.08); border-radius: 12px; }
      pre { margin-top: 20px; font-size: 12px; background: #f6f7f9; padding: 14px; border-radius: 8px; overflow:auto; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>glyphText("#hero", "LINNO") — React も &lt;Canvas&gt; も無し</h1>
      <div id="hero"></div>
      <pre>import { glyphText } from "glyphdust";
glyphText("#hero", "LINNO");</pre>
    </div>
    <script type="module" src="/src/vanilla-main.ts"></script>
  </body>
</html>
