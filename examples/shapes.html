<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>glyphdust — shape keyframes / morphToShape()</title>
    <style>
      * { margin: 0; box-sizing: border-box; }
      html, body { background: #fff; color: #1b2330; font-family: system-ui, sans-serif; }
      .wrap { max-width: 920px; margin: 0 auto; padding: 32px 20px; }
      h1 { font-size: 15px; letter-spacing: 0.04em; opacity: 0.55; margin-bottom: 16px; font-weight: 600; }
      #hero { width: 100%; height: 420px; border: 1px solid rgba(27,35,48,0.08); border-radius: 12px; }
      .row { display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap; }
      button { font: inherit; font-size: 13px; padding: 8px 14px; border-radius: 8px; border: 1px solid rgba(27,35,48,0.18); background: #fff; cursor: pointer; }
      button:hover { background: #f2f4f8; }
      pre { margin-top: 20px; font-size: 12px; background: #f6f7f9; padding: 14px; border-radius: 8px; overflow: auto; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>shape キーフレーム — テキスト → 形 → テキスト を粒子で行き来する</h1>
      <div id="hero"></div>
      <div class="row">
        <button data-morph="text">morphTo("LINNO")</button>
        <button data-morph="heart">morphToShape(ハート)</button>
        <button data-morph="star">morphToShape(星)</button>
        <button data-morph="bolt">morphToShape(稲妻)</button>
        <button data-morph="scatter">scatter()</button>
      </div>
      <pre>const h = glyphText("#hero", "LINNO");
await h.morphToShape("M12 21 C5 14 2 10.5 2 7.6 …");   // SVG の d をそのまま
await h.morphTo("SHAPES");                              // テキストにも戻れる</pre>
    </div>
    <script type="module" src="/src/shapes-main.ts"></script>
  </body>
</html>
